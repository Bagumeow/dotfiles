
# [env]
# TERM = "xterm-256color"

[colors]
draw_bold_text_with_bright_colors = true

# Ghi đè nền đen của theme import thành xám đậm (dễ nhìn hơn, giống panel chat)
[colors.primary]
background = '#1e2030'

# Ghi đè màu xanh dương của theme (#0000b2 quá tối, không đọc được trên nền tối)
# Dùng xanh Tokyonight Moon — cùng palette với nền #1e2030 ở trên
[colors.normal]
blue = '#82aaff'

[colors.bright]
blue = '#9db8ff'

[window]
padding = { x = 0, y = 0 }
decorations = "none"

opacity = 1
# opacity = 0.8
# blur = true

[font]
size = 16

  [font.normal]
  family = "JetbrainsMono Nerd Font Mono"

[general]
import = [
    "~/.config/alacritty/themes/themes/terminal_app.toml"
]

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

# Mở Alacritty là tự vào tmux (attach session cũ hoặc khôi phục sau reboot)
[terminal.shell]
program = "__TMUX_LAUNCH__"
args = []
